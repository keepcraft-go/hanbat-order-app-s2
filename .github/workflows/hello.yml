name: Hello World

on:
  push:
    branches: [main]
  workflow_dispatch:      # 수동 실행 버튼 추가

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: "코드 체크아웃"
        uses: actions/checkout@v4

      - name: "인사하기"
        run: echo "안녕하세요, ${{ github.actor }}님! 커밋: ${{ github.sha }}"

      - name: "파일 목록 출력"
        run: ls -la
