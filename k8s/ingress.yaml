apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hanbat-ingress
  namespace: hanbat-keepcraft-go
  annotations:
    # AKS 기본 nginx ingress controller 사용
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    # Phase 3~4 실습: IP 기반 접근 (FQDN 설정 없음)
    # 강사가 제공하는 ingress IP 주소로 브라우저에서 접근합니다
    - http:
        paths:
          # 웹 UI
          - path: /
            pathType: Prefix
            backend:
              service:
                name: order-web
                port:
                  number: 80
          # API 직접 호출 (디버깅용)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: order-api
                port:
                  number: 8080
